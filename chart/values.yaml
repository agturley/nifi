jvm:
  heapSize: "8g"
  gcCollector: "g1gc"      # Options: zgc, g1gc
  gcLogging:
    enabled: true
    path: "/opt/nifi/logs/gc.log"
    fileCount: 5
    fileSize: "20m"

  # GC tuning - leave any value empty to use JVM defaults.
  # Most users should not need to set these.
  zgc:
    generational: true        # Java 21+
    alwaysPreTouch: true
    uncommitDelay: 300        # seconds before returning unused heap to OS
    disableExplicitGC: true   # suppress System.gc() calls
    concGCThreads:            # leave unset; ZGC self-tunes based on heap size
    extraArgs: []

  g1gc:
    maxGCPauseMillis:
    heapRegionSize:
    newSizePercent:
    maxNewSizePercent:
    mixedGCLiveThresholdPercent:
    initiatingHeapOccupancyPercent:
    concGCThreads:
    parallelGCThreads:
    alwaysPreTouch: true
    extraArgs: []
